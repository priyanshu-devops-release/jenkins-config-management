jcasc:
  security: |
    jenkins:
      securityRealm:
        local:
          allowsSignup: false

  authorization: |
    jenkins:
      authorizationStrategy:
        loggedInUsersCanDoAnything:
          allowAnonymousRead: false

  credentials: |
    credentials:
      system:
        domainCredentials: []

  libraries: |
    unclassified:
      globalLibraries:
        libraries: []